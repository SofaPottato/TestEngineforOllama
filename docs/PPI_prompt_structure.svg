<?xml version="1.0" encoding="UTF-8"?>
<svg width="780" height="480" viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="780" height="480" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a1a2e">PPI Prompt Structure — User Prompt</text>
  <line x1="60" y1="46" x2="720" y2="46" stroke="#ccc" stroke-width="1.5"/>

  <!-- User Prompt Header -->
  <rect x="270" y="58" width="240" height="52" rx="10" fill="#1d3557" stroke="#0d1b2a" stroke-width="1.5"/>
  <text x="390" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">User Prompt</text>
  <text x="390" y="95" text-anchor="middle" font-size="10.5" fill="#a8dadc">( role="user" )</text>
  <text x="390" y="107" text-anchor="middle" font-size="9.5" fill="#90b8d6" font-style="italic">PromptFormatter._formatSingle()</text>

  <!-- Arrow down -->
  <line x1="390" y1="110" x2="390" y2="135" stroke="#555" stroke-width="1.5"/>
  <polygon points="386,135 394,135 390,143" fill="#555"/>

  <!-- Outer box -->
  <rect x="60" y="143" width="660" height="322" rx="10" fill="#fff" stroke="#1d3557" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="390" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d3557">taskTemplate 填入結果</text>

  <!-- Context (passage) -->
  <rect x="76" y="172" width="628" height="108" rx="6" fill="#e8f4fd" stroke="#aec6cf" stroke-width="1"/>
  <text x="390" y="189" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1d3557">Context  (單句 Passage)</text>

  <rect x="88" y="196" width="72" height="17" rx="3" fill="#cfe2f3"/>
  <text x="124" y="208" text-anchor="middle" font-size="10" fill="#1d3557" font-weight="bold">passage</text>
  <text x="168" y="208" font-size="10" fill="#555">→ 含 PROTEIN1 / PROTEIN2 / PROTEIN 佔位符的單句</text>
  <text x="88" y="225" font-size="9" fill="#777" font-style="italic">contextColumns: ["passage"]</text>

  <!-- Example sentence box -->
  <rect x="88" y="234" width="604" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text font-size="8.5" font-style="italic">
    <tspan x="96" y="248" fill="#1e40af">e.g.  "Production of </tspan><tspan fill="#dc2626" font-weight="bold" font-style="normal">PROTEIN1</tspan><tspan fill="#1e40af"> about 1 h earlier than normal does affect </tspan><tspan fill="#dc2626" font-weight="bold" font-style="normal">PROTEIN2</tspan><tspan fill="#1e40af"> which when</tspan>
    <tspan x="96" dy="14" fill="#1e40af">phosphorylated is an activator of </tspan><tspan fill="#9ca3af" font-weight="bold" font-style="normal">PROTEIN</tspan><tspan fill="#1e40af"> transcription."</tspan>
  </text>

  <!-- Task Instruction -->
  <rect x="76" y="290" width="628" height="58" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="390" y="307" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#856404">Task Instruction</text>
  <text x="88" y="327" font-size="9.5" fill="#555">"Based on the sentence above, do PROTEIN1 and PROTEIN2 have a protein-protein interaction (PPI)?"</text>


  <!-- Output Rules -->
  <rect x="76" y="358" width="628" height="96" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="390" y="375" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1b5e20">Output Rules</text>
  <text x="88" y="395" font-size="9.5" fill="#555">1. Output ONLY: "1: Yes" or "1: No"</text>
  <text x="88" y="411" font-size="9.5" fill="#555">2. Do NOT provide explanations.</text>
  <text x="88" y="427" font-size="9.5" fill="#555">3. Do NOT use Markdown formatting.</text>
  <text x="88" y="443" font-size="9" fill="#777" font-style="italic">  (固定單筆回答，指定 "1: Yes/No")</text>

</svg>
