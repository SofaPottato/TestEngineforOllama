<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1420" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="1420" fill="#f8f9fb" rx="12"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Main_LLM — 專案流程與資料流總覽</text>
  <text x="500" y="62" text-anchor="middle" font-size="12" fill="#666">BC5CDR 化學-疾病關係分類 · 本地 Ollama LLM 多模型 × 多 Prompt 批次實驗</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrDashed" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d35400"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- ENTRY: call_LLM.py -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="340" y="80" width="320" height="48" rx="10" fill="#1a1a2e" stroke="#1a1a2e"/>
  <text x="500" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">ENTRY · call_LLM.py</text>
  <text x="500" y="118" text-anchor="middle" font-size="10" fill="#c8d6e5">argparse --config → ReadLLMConfig → Pydantic 驗證 → Pipeline.run()</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CONFIG layer (3 sources at the top) -->
  <!-- ══════════════════════════════════════════ -->
  <!-- llm_config.yaml (primary config) -->
  <rect x="40" y="148" width="300" height="128" rx="10" fill="#fff" stroke="#e67e22" stroke-width="2"/>
  <rect x="40" y="148" width="6" height="128" rx="3" fill="#e67e22"/>
  <text x="60" y="170" font-size="11" font-weight="bold" fill="#e67e22">configs/llm_config.yaml  ★ 主設定</text>
  <text x="60" y="188" font-size="10" fill="#333" font-family="monospace">paths: taskCsvPath / promptCmbPath / outputRoot</text>
  <text x="60" y="203" font-size="10" fill="#333" font-family="monospace">selectedModels: [llama3.2:1b, ...]</text>
  <text x="60" y="218" font-size="10" fill="#333" font-family="monospace">pairNumber: 10   ← 批次 vs 單筆模式開關</text>
  <text x="60" y="233" font-size="10" fill="#333" font-family="monospace">taskTemplate / pairTemplate / pairColumns</text>
  <text x="60" y="248" font-size="10" fill="#333" font-family="monospace">llmOptions (temperature, num_ctx, num_gpu...)</text>
  <text x="60" y="263" font-size="10" fill="#333" font-family="monospace">labelMap / concurrencyPerModel / maxConcurrentModels</text>

  <!-- Task CSV -->
  <rect x="360" y="148" width="300" height="128" rx="10" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <rect x="360" y="148" width="6" height="128" rx="3" fill="#27ae60"/>
  <text x="380" y="170" font-size="11" font-weight="bold" fill="#27ae60">data/tasks.csv</text>
  <text x="380" y="188" font-size="10" fill="#555">由 preprocess/bc5cdr.py 產生（按 PMID 分組）</text>
  <text x="380" y="208" font-size="10" fill="#333" font-family="monospace">taskID  (PMID)</text>
  <text x="380" y="223" font-size="10" fill="#333" font-family="monospace">title / abstract       ← contextColumns</text>
  <text x="380" y="238" font-size="10" fill="#333" font-family="monospace">pairs : JSON array</text>
  <text x="380" y="253" font-size="10" fill="#333" font-family="monospace">  [{id, e1, e2, label}, ...]</text>
  <rect x="380" y="258" width="260" height="12" rx="3" fill="#eafaf1"/>
  <text x="388" y="268" font-size="9" fill="#196f3d" font-family="monospace">N 篇論文 × 每篇 M 個實體對</text>

  <!-- Prompt CSV (was wrongly labeled as yaml before) -->
  <rect x="680" y="148" width="300" height="128" rx="10" fill="#fff" stroke="#8e44ad" stroke-width="2"/>
  <rect x="680" y="148" width="6" height="128" rx="3" fill="#8e44ad"/>
  <text x="700" y="170" font-size="11" font-weight="bold" fill="#8e44ad">Prompt CSV (promptCmbPath)</text>
  <text x="700" y="188" font-size="10" fill="#555">多組系統 Prompt 做對照實驗（CSV 非 YAML）</text>
  <text x="700" y="208" font-size="10" fill="#333" font-family="monospace">promptID    (e.g. S2A01, RE201)</text>
  <text x="700" y="223" font-size="10" fill="#333" font-family="monospace">promptText  (系統提示內容)</text>
  <text x="700" y="248" font-size="10" fill="#777">說明：userPrompt 由 taskTemplate</text>
  <text x="700" y="263" font-size="10" fill="#777">+ pairTemplate 動態渲染 (見 Step 2)</text>

  <!-- connecting lines from entry to configs -->
  <line x1="500" y1="128" x2="190" y2="148" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="500" y1="128" x2="510" y2="148" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="500" y1="128" x2="830" y2="148" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 1: Load + Preview -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="300" width="920" height="70" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="300" width="6" height="70" rx="3" fill="#2c3e50"/>
  <text x="60" y="322" font-size="12" font-weight="bold" fill="#2c3e50">STEP 1 — 資料載入 · Pipeline.doLoadTaskCsv() / doLoadPromptCmb() / doSavePromptPreview()</text>
  <text x="60" y="342" font-size="10.5" fill="#444">驗證必要欄位 (taskID, pairs, contextColumns)；提前渲染所有 prompt 並輸出預覽 CSV 供人工檢查</text>
  <rect x="60" y="350" width="900" height="14" rx="4" fill="#ecf0f1"/>
  <text x="70" y="361" font-size="9.5" fill="#566573" font-family="monospace">輸出: promptPreviewPath (taskID, promptID, sysPrompt, userPrompt)</text>

  <!-- Arrow 1→2 -->
  <line x1="500" y1="370" x2="500" y2="392" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 2: Task build (with nested PromptFormatter) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="394" width="920" height="180" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="394" width="6" height="180" rx="3" fill="#e74c3c"/>
  <text x="60" y="416" font-size="12" font-weight="bold" fill="#e74c3c">STEP 2 — 任務建構 · Pipeline._buildTaskBatches() + doBuildLLMTasks() + PromptFormatter</text>

  <!-- sub-box A: batching -->
  <rect x="60" y="428" width="440" height="135" rx="8" fill="#fdecea"/>
  <text x="72" y="446" font-size="10.5" font-weight="bold" fill="#c0392b">A. 每篇論文切批次 (_buildTaskBatches)</text>
  <text x="72" y="462" font-size="10" fill="#333">• 解析 pairs JSON，依 pairNumber 切片</text>
  <text x="72" y="478" font-size="10" fill="#333">• batchID = taskBaseID_{offset}  (若 pairs &gt; pairNumber)</text>
  <text x="72" y="494" font-size="10" fill="#333">• 呼叫 PromptFormatter.format(context, batchPairs)</text>
  <text x="72" y="510" font-size="10" fill="#666">   批次模式: 用 pairTemplate 迭代串接 → 填 {pairs}</text>
  <text x="72" y="524" font-size="10" fill="#666">   單筆模式 (pairNumber=1): 直接合併 context + pair[0]</text>
  <rect x="72" y="532" width="418" height="14" rx="3" fill="#fff"/>
  <text x="80" y="542" font-size="9" fill="#922b21" font-family="monospace">產出: [(taskID, pairs, userPrompt), ...]  ← 雙層迴圈外只算一次</text>

  <!-- sub-box B: cross product -->
  <rect x="520" y="428" width="420" height="135" rx="8" fill="#fdecea"/>
  <text x="532" y="446" font-size="10.5" font-weight="bold" fill="#c0392b">B. 笛卡爾積 + 斷點續傳 (doBuildLLMTasks)</text>
  <text x="532" y="462" font-size="10" fill="#333">• 先讀 rawOutputPath → completedIDSet</text>
  <text x="532" y="478" font-size="10" fill="#333">• for model in selectedModels:</text>
  <text x="532" y="494" font-size="10" fill="#333">    for promptID in promptCmbList:</text>
  <text x="532" y="510" font-size="10" fill="#333">      for batch in rowsList:  → LLMTask</text>
  <text x="532" y="526" font-size="10" fill="#333">• fullTaskID = model::promptID::taskBaseID</text>
  <rect x="532" y="532" width="400" height="14" rx="3" fill="#fff"/>
  <text x="540" y="542" font-size="9" fill="#922b21" font-family="monospace">跳過 fullTaskID ∈ completedIDSet 的任務</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="574" x2="500" y2="596" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 3: Async inference with dual-layer semaphores -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="598" width="920" height="200" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="598" width="6" height="200" rx="3" fill="#2980b9"/>
  <text x="60" y="620" font-size="12" font-weight="bold" fill="#2980b9">STEP 3 — 非同步推論 · llm_modules/OllamaEngine.py (LLMEngine + OllamaClient)</text>

  <!-- Concurrency architecture diagram -->
  <rect x="60" y="632" width="580" height="158" rx="8" fill="#eaf4fb"/>
  <text x="72" y="650" font-size="10.5" font-weight="bold" fill="#1a5276">雙層 Semaphore 併發控制</text>

  <!-- outer gate -->
  <rect x="80" y="660" width="540" height="120" rx="6" fill="#fff" stroke="#2980b9" stroke-dasharray="4 3"/>
  <text x="90" y="675" font-size="9.5" font-weight="bold" fill="#2980b9">modelConcurrencySemaphore  (maxConcurrentModels)</text>

  <!-- inner model boxes -->
  <rect x="96" y="684" width="160" height="88" rx="5" fill="#d6eaf8"/>
  <text x="176" y="700" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5276">Model A group</text>
  <rect x="106" y="708" width="140" height="14" rx="3" fill="#fff"/>
  <text x="176" y="719" text-anchor="middle" font-size="9" fill="#1a5276">modelSemaphoreDict[A]</text>
  <text x="176" y="736" text-anchor="middle" font-size="9" fill="#555">concurrencyPerModel 個</text>
  <text x="176" y="749" text-anchor="middle" font-size="9" fill="#555">coroutine 同時跑</text>
  <text x="176" y="765" text-anchor="middle" font-size="9" fill="#555">as_completed + tqdm</text>

  <rect x="272" y="684" width="160" height="88" rx="5" fill="#d6eaf8"/>
  <text x="352" y="700" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a5276">Model B group</text>
  <rect x="282" y="708" width="140" height="14" rx="3" fill="#fff"/>
  <text x="352" y="719" text-anchor="middle" font-size="9" fill="#1a5276">modelSemaphoreDict[B]</text>
  <text x="352" y="736" text-anchor="middle" font-size="9" fill="#555">…</text>

  <rect x="448" y="684" width="160" height="88" rx="5" fill="#eaeaea" stroke-dasharray="3 3" stroke="#888"/>
  <text x="528" y="700" text-anchor="middle" font-size="10" font-weight="bold" fill="#666">Model C (waiting)</text>
  <text x="528" y="720" text-anchor="middle" font-size="9" fill="#888">超過 maxConcurrentModels</text>
  <text x="528" y="734" text-anchor="middle" font-size="9" fill="#888">排隊中</text>

  <!-- Right column: per-request pipeline -->
  <rect x="660" y="632" width="280" height="158" rx="8" fill="#eaf4fb"/>
  <text x="672" y="650" font-size="10.5" font-weight="bold" fill="#1a5276">每筆 doProcessSingleTask</text>
  <text x="672" y="670" font-size="9.5" fill="#333">1. 進模型 Semaphore 排隊</text>
  <text x="672" y="686" font-size="9.5" fill="#333">2. OllamaClient.doGenerate()</text>
  <text x="672" y="700" font-size="9" fill="#666">   tenacity 重試 3 次 (1→2→4s)</text>
  <text x="672" y="714" font-size="9" fill="#666">   httpx POST /api/chat</text>
  <text x="672" y="730" font-size="9.5" fill="#333">3. asyncio.Lock 保護 CSV 寫入</text>
  <text x="672" y="744" font-size="9" fill="#666">   append + flush + fsync</text>
  <text x="672" y="760" font-size="9.5" fill="#333">4. existingTaskIDSet.add(taskID)</text>
  <text x="672" y="774" font-size="9" fill="#c0392b">   ← 寫入端 dedup 安全網</text>

  <!-- Arrow 3→4 with checkpoint loopback label -->
  <line x1="500" y1="798" x2="500" y2="820" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Raw CSV checkpoint loopback (visual hint) -->
  <path d="M 980 700 Q 1000 700 1000 500 Q 1000 440 500 440" fill="none" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrDashed)"/>
  <rect x="830" y="555" width="160" height="36" rx="5" fill="#fff3e0" stroke="#d35400" stroke-dasharray="2 2"/>
  <text x="910" y="570" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#d35400">rawOutputPath (raw.csv)</text>
  <text x="910" y="584" text-anchor="middle" font-size="9" fill="#a04000">斷點續傳：下次啟動被讀回</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 4: OutputParser -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="822" width="920" height="110" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="822" width="6" height="110" rx="3" fill="#16a085"/>
  <text x="60" y="844" font-size="12" font-weight="bold" fill="#16a085">STEP 4 — 解析 · llm_modules/OutputParser.py</text>

  <rect x="60" y="854" width="430" height="68" rx="6" fill="#d0f0ea"/>
  <text x="72" y="871" font-size="10" font-weight="bold" fill="#0e6655">doExtractAnswers(text, batchSize)</text>
  <text x="72" y="887" font-size="9.5" fill="#0e6655">batchSize=1 : keyword 掃整段 (yes/positive→1, no/none→0)</text>
  <text x="72" y="902" font-size="9.5" fill="#0e6655">batchSize&gt;1 : regex 切編號區塊 \n\s*\d+\s*[:.)-]</text>
  <text x="72" y="916" font-size="9" fill="#566573">解析失敗 → -1 (後續 Evaluate 會過濾)</text>

  <rect x="510" y="854" width="430" height="68" rx="6" fill="#d0f0ea"/>
  <text x="522" y="871" font-size="10" font-weight="bold" fill="#0e6655">展開 pairs → 長表格 (一列 = 一個 pair)</text>
  <text x="522" y="887" font-size="9" fill="#0e6655" font-family="monospace">dataID, Model, promptID, trueLabel, predLabel, rawOutput, +自訂欄</text>
  <text x="522" y="905" font-size="9.5" fill="#0e6655">輸出: resultPath + singlePromptCmbOutputDir/ (每 promptID 一檔)</text>

  <!-- Arrow 4→5 -->
  <line x1="500" y1="932" x2="500" y2="954" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 5: LLMResultProcessor -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="956" width="920" height="116" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="956" width="6" height="116" rx="3" fill="#d35400"/>
  <text x="60" y="978" font-size="12" font-weight="bold" fill="#d35400">STEP 5 — 長轉寬 + 標籤正規化 · llm_modules/LLMResultProcessor.py</text>
  <text x="60" y="996" font-size="10" fill="#444">• 用 labelMap 將 trueLabel 標準化為 1 / 0 / -1    • Feature_Name = Model_promptID</text>
  <text x="60" y="1012" font-size="10" fill="#444">• pivot_table: index=(dataID + 自訂欄 + trueLabel),  columns=Feature_Name,  values=predLabel</text>

  <rect x="60" y="1022" width="430" height="42" rx="6" fill="#fff3e0"/>
  <text x="72" y="1038" font-size="10" font-weight="bold" fill="#a04000">partialInfo.csv (精簡版 → 給 Evaluate)</text>
  <text x="72" y="1054" font-size="9" fill="#a04000" font-family="monospace">dataID, trueLabel, Feature_Name_1, Feature_Name_2, ...</text>

  <rect x="510" y="1022" width="430" height="42" rx="6" fill="#fff3e0"/>
  <text x="522" y="1038" font-size="10" font-weight="bold" fill="#a04000">fullInfo.csv (完整版 → 人工審閱)</text>
  <text x="522" y="1054" font-size="9" fill="#a04000" font-family="monospace">partialInfo + e1, e2, 以及所有自訂欄位</text>

  <!-- Arrow 5→6 -->
  <line x1="500" y1="1072" x2="500" y2="1094" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════ -->
  <!-- STEP 6: Evaluate -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="1096" width="920" height="200" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.5"/>
  <rect x="40" y="1096" width="6" height="200" rx="3" fill="#c0392b"/>
  <text x="60" y="1118" font-size="12" font-weight="bold" fill="#c0392b">STEP 6 — 評估 · llm_modules/Evaluate.py (PromptCmbEval)</text>
  <text x="60" y="1136" font-size="10" fill="#444">動態偵測預測欄（值 ⊆ {-1, 0, 1}），逐欄排除 -1 後計算分類指標</text>

  <!-- Metrics row -->
  <rect x="60" y="1146" width="430" height="68" rx="6" fill="#fadbd8"/>
  <text x="72" y="1163" font-size="10" font-weight="bold" fill="#922b21">doEval() / doCalcPromptCmbMetrics()</text>
  <text x="72" y="1179" font-size="9.5" fill="#922b21">Accuracy · Precision · Recall · F1 · MCC</text>
  <text x="72" y="1194" font-size="9.5" fill="#922b21">reportDf 按 F1 降序 → 找最佳組合</text>
  <text x="72" y="1208" font-size="9" fill="#6e2c27">correctnessMatrixDf: 每樣本對每模型的對錯 (0/1)</text>

  <rect x="510" y="1146" width="430" height="68" rx="6" fill="#fadbd8"/>
  <text x="522" y="1163" font-size="10" font-weight="bold" fill="#922b21">doAnalyzeUpperBound()</text>
  <text x="522" y="1179" font-size="9.5" fill="#922b21">難題 = 所有模型都答錯的樣本</text>
  <text x="522" y="1194" font-size="9.5" fill="#922b21">upperBound = 1 − 難題率</text>
  <text x="522" y="1208" font-size="9" fill="#6e2c27">用於判斷：是 prompt 問題還是資料本身太難</text>

  <!-- Output chips -->
  <rect x="60" y="1224" width="160" height="22" rx="11" fill="#fadbd8"/>
  <text x="140" y="1239" text-anchor="middle" font-size="10" fill="#922b21">eval_summary.csv</text>
  <rect x="230" y="1224" width="170" height="22" rx="11" fill="#fadbd8"/>
  <text x="315" y="1239" text-anchor="middle" font-size="10" fill="#922b21">samples_to_review.csv</text>
  <rect x="410" y="1224" width="220" height="22" rx="11" fill="#fadbd8"/>
  <text x="520" y="1239" text-anchor="middle" font-size="10" fill="#922b21">plots/CM_{model_prompt}.png</text>
  <rect x="640" y="1224" width="210" height="22" rx="11" fill="#fadbd8"/>
  <text x="745" y="1239" text-anchor="middle" font-size="10" fill="#922b21">correctness_heatmap.png</text>

  <text x="60" y="1272" font-size="10" fill="#666">輸出目錄結構：outputRoot / eval /  (summary + plots/)</text>
  <text x="60" y="1288" font-size="10" fill="#666">所有下游檔案路徑皆由 llm_config.yaml 的 paths 段決定</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Legend / Data flow summary at the bottom -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="1312" width="920" height="92" rx="10" fill="#fff" stroke="#c8d6e5" stroke-width="1.2"/>
  <text x="60" y="1332" font-size="11" font-weight="bold" fill="#1a1a2e">資料流摘要</text>
  <text x="60" y="1352" font-size="10" fill="#333" font-family="monospace">BC5CDR raw  →  tasks.csv  →  LLMTask list (M×P×T)  →  raw.csv  →  result.csv (long)  →  partialInfo.csv (wide)  →  eval_*</text>
  <text x="60" y="1370" font-size="9.5" fill="#666">橘色虛線 = checkpoint 回饋：raw.csv 同時作為「已完成任務清單」來源，中斷後重啟能從中間繼續</text>
  <text x="60" y="1388" font-size="9.5" fill="#666">綠/紅/藍/紫色框 = 對應 config 中 paths / selectedModels / 併發參數 / 模板的作用點</text>
</svg>
