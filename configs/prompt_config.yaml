# =========================================================
# 檔案與路徑設定
# =========================================================
# 來源檔案路徑
promptYamlPath: "configs/prompts.yaml"
# 存放路徑
promptListOutputPath: "data/prompt_output"
# 輸出檔案名稱
promptListFileName: "test_manual_prompts"
# =========================================================
# Prompt 生成模式設定
# =========================================================
# 模式選擇
promptMode: "manual" 
# --- Auto 模式參數 ---
autoSettingsDict: 
  methods: ['EMO', 'Role', 'S2A', 'RAR']
  max_size: 4
# --- Manual 模式參數 ---
manualKeysList: 
  - ['EMO01', 'RAR02']
  - ['S2A01', 'RE201']
