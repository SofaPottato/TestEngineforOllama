# =========================================================
# 1. 檔案與路徑設定 (Path Settings)
# =========================================================
# 來源檔案路徑
promptYamlPath: "configs/prompts.yaml"

# =========================================================
# 2. Prompt 列表輸出設定 (Export Settings)
# =========================================================
# 是否輸出 (b_ 前綴)
b_exportPromptList: True

# 存放路徑
promptListOutputPath: "data/prompt_output"

# 輸出檔案名稱
promptListFileName: "test_prompts"

# =========================================================
# 3. Prompt 生成模式設定 (Generation Settings)
# =========================================================
# 模式選擇
promptMode: = "auto" 

# --- Auto 模式參數 ---
# 字典後綴 (Dict)，內部 key 保持小寫（比照 ifeatureDict）
autoSettingsDict: 
  methods: ['EMO', 'Role', 'S2A', 'RAR']
  max_size: 4


# --- Manual 模式參數 ---
# 列表後綴 (List)
manualKeysList: 
  - ['01', '04']
  - ['02', '05']
