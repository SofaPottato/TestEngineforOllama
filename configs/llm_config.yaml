# =========================================================================
# LLM 推論主設定檔
# 使用前先跑前處理：
#   python preprocess/bc5cdr.py --input data/bcvcdr_raw/BCVCDR_Processed.csv \
#       --output data/test/tasks.csv --batch_size 5
# =========================================================================

paths:
  taskCsvPath:           "data/test/tasks.csv"
  promptCmbPath:         "data/prompt_output/test_manual_prompts.csv"
  rawOutputPath:         "data/test/output/raw.csv"
  resultPath:            "data/test/output/result.csv"
  singlePromptOutputDir: "data/test/output/singleOutput"
  partialInfoPath:       "data/test/output/partialInfo.csv"
  fullInfoPath:          "data/test/output/fullInfo.csv"
  evalDir:               "data/test/output/eval"

selectedModels: ["llama3.2:1b"]

ollamaServer:
  url:     "http://localhost:11434/api/chat"
  timeout: 600

llmOptions:
  temperature:    0
  num_predict:    60
  num_ctx:        8192
  num_gpu:        99
  repeat_penalty: 1.1

labelMap:
  positive: ["cid"]
  negative: ["0", "false", "none", "negative"]

concurrencyPerModel: 4
maxConcurrentModels: 1

taskTemplate: |
  Title: {title}
  Abstract: {abstract}

  Task: Determine if the Chemical induces the Disease for the following pairs based strictly on the text.

  Pairs to analyze:
  {items}

  IMPORTANT OUTPUT RULES:
  1. Output ONLY a numbered list.
  2. Format: "1: Yes" or "1: No"
  3. Do NOT provide explanations.
  4. Do NOT use Markdown formatting.

itemTemplate: "{i}: Chemical: {e1} | Disease: {e2}\n"
